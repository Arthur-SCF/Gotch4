version: "3.8"

networks:
  app-network:
    driver: bridge

services:
  database:
    image: postgres:latest
    environment:
      - POSTGRES_DB=capture
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"
    volumes:
      - ./db_data:/var/lib/postgresql
    restart: unless-stopped
    networks:
      - app-network

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./minio_data:/data
    restart: unless-stopped
    networks:
      - app-network
